name: Build Flutter APK (Fixed & Clean)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java (Zulu JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Stable
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Find and Fix Flutter Project Structure
      run: |
        PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
        
        if [ -z "$PUBSPEC_PATH" ]; then
          echo "ERROR: pubspec.yaml nebyl nalezen!"
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        
        cd "$PROJECT_DIR"
        # Vyčistíme staré konfliktní Gradle soubory v kořeni projektu
        rm -f build.gradle settings.gradle gradlew gradlew.bat
        rm -rf android
        
        # Vytvoříme čistou android složku (bez parametru --force, který házel chybu)
        flutter create . --platforms=android

    - name: Fetch Dependencies
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter pub get

    - name: Build Debug APK
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter build apk --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneRoomSLAM-APK
        path: "${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk"
        if-no-files-found: error
        
