name: Build Android APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - uses: android-actions/setup-android@v3

    - name: Install NDK and Tools
      run: |
        sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1" "build-tools;34.0.0"

    - name: Compile C++ and Build Minimal APK
      run: |
        # Vytvoření build adresáře pro CMake
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-24 \
              -DCMAKE_BUILD_TYPE=Debug .. || true
        make || true
        cd ..
        
        # Sestavení minimálního balíčku pomocí build-tools, pokud
        
