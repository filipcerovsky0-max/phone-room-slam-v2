name: Build Flutter APK (Auto-Detect Path)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java (Zulu JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Stable
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Find and Fix Flutter Project Structure
      run: |
        # Najdeme, kde se nachází pubspec.yaml
        PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
        
        if [ -z "$PUBSPEC_PATH" ]; then
          echo "ERROR: pubspec.yaml nebyl v repozitáři vůbec nalezen!"
          exit 1
        fi
        
        # Získáme složku, ve které pubspec.yaml leží
        PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
        echo "Flutter projekt nalezen ve složce: $PROJECT_DIR"
        
        cd "$PROJECT_DIR"
        # Vyčistíme případný starý nekompletní android bordel v téhle složce
        rm -f build.gradle settings.gradle gradlew gradlew.bat
        rm -rf android
        
        # Vynutíme vygenerování čisté android složky přímo u pubspec.yaml
        flutter create . --platforms=android --force

    - name: Fetch Dependencies
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter pub get

    - name: Build Debug APK
      run: |
        cd ${{ env.PROJECT_DIR }}
        flutter build apk --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneRoomSLAM-APK
        path: "${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk"
        if-no-files-found: error
        
