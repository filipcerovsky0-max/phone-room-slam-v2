name: Build Flutter APK (Final & Clean)
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java (Zulu JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Stable
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Wipe and Recreate Android Structure
      run: |
        # Smažeme staré nekompletní Gradle/Android soubory v kořeni, které dělaly neplechu
        rm -f build.gradle settings.gradle gradlew gradlew.bat
        rm -rf android
        
        # Flutter na zelené louce vygeneruje správnou a čistou Android strukturu
        flutter create . --platforms=android --force

    - name: Fetch Dependencies
      run: flutter pub get

    - name: Build Debug APK
      run: flutter build apk --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneRoomSLAM-APK
        path: build/app/outputs/flutter-apk/app-debug.apk
        if-no-files-found: error
        
