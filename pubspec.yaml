name: phone_room_slam
description: "Velmi komplexní mobilní aplikace pro mapování místností pomocí senzorů telefonu. Inspirace SLAM z chytrých vysavačů. Pokročilá fúze IMU + GPS, detekce kroků, tvorba 2D occupancy grid mapy, vizualizace v reálném čase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management - Riverpod for complex reactive state
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Sensors
  sensors_plus: ^5.0.1
  geolocator: ^12.0.0
  # Permissions
  permission_handler: ^11.3.1
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  # Charts for live sensor data
  fl_chart: ^0.68.0
  # Math for quaternions, vectors, filters
  vector_math: ^2.1.4
  # For nice UI
  google_fonts: ^6.2.1
  # Export / share
  share_plus: ^9.0.0
  # For complex computations (future isolates)
  # uuid for session ids
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
